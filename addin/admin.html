<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shayntech Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#0d0f14;color:#e8eaf0;min-height:100vh}
  .topbar{background:#14171f;border-bottom:1px solid #2a2f42;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
  .topbar h1{font-size:18px;font-weight:700;background:linear-gradient(90deg,#00e5a0,#0099ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .topbar span{font-size:12px;color:#6b7280}
  .login-box{max-width:380px;margin:100px auto;background:#14171f;border:1px solid #2a2f42;border-radius:14px;padding:32px}
  .login-box h2{margin-bottom:20px;font-size:16px;color:#e8eaf0}
  input{width:100%;padding:10px 14px;background:#1c2030;border:1px solid #2a2f42;border-radius:8px;color:#e8eaf0;font-size:14px;margin-bottom:14px;outline:none}
  input:focus{border-color:#00e5a0}
  button{width:100%;padding:11px;background:#00e5a0;color:#000;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer}
  button:hover{background:#00c98a}
  .err{color:#ff4d6d;font-size:13px;margin-bottom:10px}
  .main{padding:28px;max-width:1100px;margin:0 auto}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
  .stat-card{background:#14171f;border:1px solid #2a2f42;border-radius:12px;padding:20px 22px}
  .stat-card .label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
  .stat-card .value{font-size:28px;font-weight:800;color:#00e5a0}
  .stat-card.blue .value{color:#0099ff}
  .stat-card.amber .value{color:#f59e0b}
  .stat-card.red .value{color:#ef4444}
  .stat-card.purple .value{color:#a78bfa}
  .section-title{font-size:14px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
  .table-wrap{background:#14171f;border:1px solid #2a2f42;border-radius:12px;overflow:hidden;margin-bottom:28px}
  table{width:100%;border-collapse:collapse}
  thead th{background:#1c2030;padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #2a2f42}
  tbody tr{border-bottom:1px solid #1c2030;transition:background .15s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:#1a1f2e}
  tbody td{padding:11px 16px;font-size:13px;color:#c9cbd4}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
  .badge.pro{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid #22c55e}
  .badge.free{background:rgba(107,114,128,.12);color:#6b7280;border:1px solid #374151}
  .usage-bar{height:6px;background:#1c2030;border-radius:3px;min-width:80px;overflow:hidden}
  .usage-bar-fill{height:100%;border-radius:3px;background:#00e5a0;transition:width .4s}
  .usage-bar-fill.warn{background:#f59e0b}
  .usage-bar-fill.danger{background:#ef4444}
  .search-row{display:flex;gap:10px;margin-bottom:16px}
  .search-row input{margin:0;flex:1;max-width:320px}
  .refresh-btn{padding:8px 16px;background:transparent;border:1px solid #2a2f42;border-radius:8px;color:#e8eaf0;font-size:13px;width:auto;cursor:pointer}
  .refresh-btn:hover{border-color:#00e5a0;color:#00e5a0;background:transparent}
  .loading{text-align:center;padding:40px;color:#6b7280}
  .logout-btn{padding:6px 14px;background:transparent;border:1px solid #374151;border-radius:7px;color:#6b7280;font-size:12px;width:auto;cursor:pointer}
  .logout-btn:hover{border-color:#ef4444;color:#ef4444;background:transparent}
  .updated{font-size:11px;color:#6b7280;margin-left:12px}
</style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen">
  <div class="login-box">
    <h2>🔐 Shayntech Admin</h2>
    <div class="err" id="login-err" style="display:none"></div>
    <input type="password" id="secret-input" placeholder="Admin secret key" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none">
  <div class="topbar">
    <h1>Shayntech Admin Dashboard</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="last-updated"></span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="main">
    <div id="loading" class="loading">Loading data...</div>
    <div id="content" style="display:none">

      <!-- Stats row -->
      <div class="stats-row" id="stats-row"></div>

      <!-- Users table -->
      <div class="section-title">All Users</div>
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Search by email..." oninput="filterTable()"/>
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Email</th>
              <th>Plan</th>
              <th>Usage</th>
              <th>Usage Bar</th>
              <th>Subscription ID</th>
              <th>Joined</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script>
var SECRET = '';
var FREE_LIMIT = 50;
var allUsers = [];

function doLogin() {
  var s = document.getElementById('secret-input').value.trim();
  if (!s) return;
  SECRET = s;
  loadData();
}

function doLogout() {
  SECRET = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('secret-input').value = '';
}

async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';
  document.getElementById('login-err').style.display = 'none';

  try {
    const [statsRes, usersRes] = await Promise.all([
      fetch('/api/admin/stats', { headers: { 'x-admin-secret': SECRET } }),
      fetch('/api/admin/users', { headers: { 'x-admin-secret': SECRET } })
    ]);

    if (statsRes.status === 401) {
      document.getElementById('login-err').textContent = 'Invalid secret key.';
      document.getElementById('login-err').style.display = 'block';
      return;
    }

    const stats = await statsRes.json();
    const users = await usersRes.json();
    allUsers = users;

    // Show dashboard
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    renderStats(stats);
    renderUsers(users);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();

  } catch(e) {
    document.getElementById('login-err').textContent = 'Connection error: ' + e.message;
    document.getElementById('login-err').style.display = 'block';
  }
}

function renderStats(s) {
  var cards = [
    { label:'Total Users',   value: s.total,      cls:''},
    { label:'Pro Users',     value: s.pro,         cls:'blue'},
    { label:'Free Users',    value: s.free,        cls:''},
    { label:'Total API Calls', value: s.totalUsage, cls:'purple'},
    { label:'Avg Usage/User', value: s.avgUsage,   cls:'amber'},
    { label:'Near Limit (≥40)', value: s.heavyUsers, cls:'red'},
  ];
  document.getElementById('stats-row').innerHTML = cards.map(function(c) {
    return '<div class="stat-card '+c.cls+'"><div class="label">'+c.label+'</div><div class="value">'+c.value+'</div></div>';
  }).join('');
}

function renderUsers(users) {
  var tbody = document.getElementById('users-tbody');
  if (!users || users.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#6b7280;padding:30px">No users yet</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(function(u, i) {
    var usage = u.lifetime_usage || 0;
    var pct   = Math.min(100, Math.round((usage / FREE_LIMIT) * 100));
    var barCls = pct >= 80 ? 'danger' : pct >= 60 ? 'warn' : '';
    var badge  = u.is_pro
      ? '<span class="badge pro">★ Pro</span>'
      : '<span class="badge free">Free</span>';
    var joined = u.created_at
      ? new Date(u.created_at).toLocaleDateString()
      : '—';
    var subId = u.lemon_subscription_id
      ? '<span style="font-size:11px;color:#6b7280">'+u.lemon_subscription_id.slice(0,16)+'…</span>'
      : '—';
    return '<tr data-email="'+(u.email||'').toLowerCase()+'">'
      + '<td style="color:#6b7280">' + (i+1) + '</td>'
      + '<td>' + (u.email || '—') + '</td>'
      + '<td>' + badge + '</td>'
      + '<td>' + usage + ' / ' + (u.is_pro ? '∞' : FREE_LIMIT) + '</td>'
      + '<td><div class="usage-bar"><div class="usage-bar-fill '+barCls+'" style="width:'+pct+'%"></div></div></td>'
      + '<td>' + subId + '</td>'
      + '<td>' + joined + '</td>'
      + '</tr>';
  }).join('');
}

function filterTable() {
  var q = document.getElementById('search-input').value.toLowerCase();
  var rows = document.querySelectorAll('#users-tbody tr');
  rows.forEach(function(r) {
    var email = r.getAttribute('data-email') || '';
    r.style.display = email.includes(q) ? '' : 'none';
  });
}

// Auto-refresh every 60 seconds
setInterval(function() { if (SECRET) loadData(); }, 60000);
</script>
</body>
</html>
